function bytes(b64) { const s=atob(b64), a=new Uint8Array(s.length);
  for (let i=0;i<s.length;i++) a[i]=s.charCodeAt(i); return a; }
async function unlock() {
  const btn=document.getElementById('go'), err=document.getElementById('err');
  btn.disabled=true; err.textContent='Расшифровка…';
  try {
    const raw=bytes(B64), salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
    const pw=new TextEncoder().encode(document.getElementById('pw').value);
    const km=await crypto.subtle.importKey('raw', pw, 'PBKDF2', false, ['deriveKey']);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt, iterations:600000, hash:'SHA-256'},
      km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
    const html=new TextDecoder().decode(pt);
    document.open(); document.write(html); document.close();
  } catch(e) {
    err.textContent='Неверный пароль'; btn.disabled=false;
  }
}
document.getElementById('go').addEventListener('click', unlock);
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });
